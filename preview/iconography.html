<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Iconography (emoji vocabulary)</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 16px; background: rgb(var(--bg-app)); font-family: var(--font-base); color: rgb(var(--fg-1));}
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px;}
  .cell {
    border: 1px solid rgb(var(--border-1)); border-radius: 8px;
    background: #fff;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 8px 4px;
    min-height: 60px;
  }
  .e { font-size: 22px; line-height: 1;}
  .l { font-size: 10px; color: rgb(var(--fg-2)); margin-top: 4px; letter-spacing: .02em;}
</style>
</head>
<body>
  <div class="grid">
    <div class="cell"><span class="e">🔍</span><span class="l">discover</span></div>
    <div class="cell"><span class="e">✨</span><span class="l">skills</span></div>
    <div class="cell"><span class="e">📝</span><span class="l">requests</span></div>
    <div class="cell"><span class="e">💡</span><span class="l">offers</span></div>
    <div class="cell"><span class="e">📋</span><span class="l">my list</span></div>
    <div class="cell"><span class="e">🎯</span><span class="l">my offers</span></div>
    <div class="cell"><span class="e">👤</span><span class="l">profile</span></div>
    <div class="cell"><span class="e">👥</span><span class="l">community</span></div>
    <div class="cell"><span class="e">🏢</span><span class="l">org</span></div>
    <div class="cell"><span class="e">🏷️</span><span class="l">service</span></div>
    <div class="cell"><span class="e">🤝</span><span class="l">mutual aid</span></div>
    <div class="cell"><span class="e">⚙️</span><span class="l">admin</span></div>
    <div class="cell"><span class="e">📦</span><span class="l">archived</span></div>
    <div class="cell"><span class="e">⏳</span><span class="l">loading</span></div>
    <div class="cell"><span class="e">🟢</span><span class="l">connected</span></div>
    <div class="cell"><span class="e">🔴</span><span class="l">error</span></div>
  </div>
</body>
</html>
