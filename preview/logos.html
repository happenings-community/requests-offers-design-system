<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Logos</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 16px; background: rgb(var(--bg-app)); }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; align-items: center; }
  .swatch {
    aspect-ratio: 1;
    border-radius: var(--radius-md);
    border: 1px solid rgb(var(--border-1));
    background: #fff;
    display: grid;
    place-items: center;
    overflow: hidden;
  }
  .swatch.violet { background: rgb(var(--color-primary-500)); }
  .swatch img { max-width: 86%; max-height: 86%; }
  .label {
    margin-top: 8px;
    font-family: var(--font-base);
    font-size: 12px;
    color: rgb(var(--fg-2));
  }
</style>
</head>
<body>
  <div class="row">
    <div>
      <div class="swatch"><img src="../assets/hAppeningsCIClogo.png" alt="hAppenings CIC logo" /></div>
      <div class="label">CIC roundel · primary lockup</div>
    </div>
    <div>
      <div class="swatch"><img src="../assets/hAppeningsLogoWsun2.webp" alt="hAppenings community wordmark" /></div>
      <div class="label">Community variant</div>
    </div>
    <div>
      <div class="swatch violet"><img src="../assets/icon.png" alt="Sun mark" /></div>
      <div class="label">Sun mark · favicon / 1024px</div>
    </div>
  </div>
</body>
</html>
